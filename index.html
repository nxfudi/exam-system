            q.options.forEach(opt => {
                let val = opt.charAt(0);
                opts += `<label class="option-item"><input type="radio" name="single_${idx}" value="${val}"> ${opt}</label>`;
            });
            html += `<div class="question-card"><div class="q-title">${idx+1}. ${q.text}</div><div class="options">${opts}</div></div>`;
        });
        html += `</div>`;

        html += `<div class="section"><div class="section-title">三、多选题（每题3分）</div>`;
        multiChoices.forEach((q, idx) => {
            let opts = '';
            q.options.forEach(opt => {
                let val = opt.charAt(0);
                opts += `<label class="option-item"><input type="checkbox" name="multi_${idx}" value="${val}"> ${opt}</label>`;
            });
            html += `<div class="question-card"><div class="q-title">${idx+1}. ${q.text}</div><div class="options">${opts}</div></div>`;
        });
        html += `</div>`;

        html += `<div class="section"><div class="section-title">四、判断题（每题1分）</div>`;
        trueFalse.forEach((q, idx) => {
            html += `<div class="question-card"><div class="q-title">${idx+1}. ${q.text}</div><div class="options">
                        <label><input type="radio" name="tf_${idx}" value="true"> ✔ 正确</label>
                        <label><input type="radio" name="tf_${idx}" value="false"> ✘ 错误</label>
                    </div></div>`;
        });
        html += `</div>`;

        html += `<div class="section"><div class="section-title">五、简答题</div>`;
        shortQuestions.forEach((q, idx) => {
            html += `<div class="question-card"><div class="q-title">${idx+1}. ${q.text}</div><textarea rows="3" class="short-answer" data-short="${idx}"></textarea></div>`;
        });
        html += `</div>`;

        html += `<div class="section"><div class="section-title">六、案例分析题</div>`;
        html += `
<div class="question-card" style="background:#fef9e6;">
    <div class="q-title">📖 案例背景</div>
    <div style="font-size:0.95rem; line-height:1.5;">
        新员工小张于2025年6月1日入职公司，试用期三个月。<br>
        6月10日（周二）上午，小张因交通拥堵迟到25分钟，当天未进行考勤签到。<br>
        6月15日，小张在工作时间使用公司电脑安装了一款游戏软件。<br>
        6月20日，小张请了半天事假（2小时），但未在办公平台提交请假流程。<br>
        6月28日，小张提交的工作微博字数为180字，且未列明工作计划的时间节点。<br>
        7月5日，小张在办公室与同事因工作问题发生大声争吵。
    </div>
</div>
`;
        caseQuestions.forEach((q, idx) => {
            html += `<div class="question-card"><div class="q-title">${q.text}</div><textarea rows="4" class="case-answer" data-case="${idx}" placeholder="请在此作答..."></textarea></div>`;
        });
        html += `</div>`;

        document.getElementById('examContent').innerHTML = html;
    }

    function countChineseChars(str) {
        const chinese = str.replace(/[^\u4e00-\u9fa5]/g, '');
        return chinese.length;
    }

    function scoreByLength(len) {
        if (len === 0) return 0;
        if (len >= 1 && len <= 9) return 0;
        if (len >= 10 && len <= 14) return 5;
        if (len >= 15 && len <= 24) return 9;
        if (len >= 25) return 10;
        return 0;
    }

    function calculateScore() {
        let total = 0;
        let fillScore = 0;
        fillBlanks.forEach((item, idx) => {
            for (let s = 0; s < item.answers.length; s++) {
                let input = document.querySelector(`.fill-input[data-fb="${idx}"][data-slot="${s}"]`);
                if (input) {
                    const userVal = input.value.trim();
                    const correctAns = item.answers[s];
                    if (isFillMatch(userVal, correctAns)) {
                        fillScore += 1;
                    }
                }
            }
        });
        total += fillScore;

        let singleScore = 0;
        singleChoices.forEach((q, idx) => {
            let selected = document.querySelector(`input[name="single_${idx}"]:checked`);
            if (selected && selected.value === q.correct) singleScore += q.points;
        });
        total += singleScore;

        let multiScore = 0;
        multiChoices.forEach((q, idx) => {
            let selected = Array.from(document.querySelectorAll(`input[name="multi_${idx}"]:checked`)).map(cb => cb.value);
            if (selected.length === q.correct.length && selected.every(v => q.correct.includes(v))) multiScore += q.points;
        });
        total += multiScore;

        let tfScore = 0;
        trueFalse.forEach((q, idx) => {
            let selected = document.querySelector(`input[name="tf_${idx}"]:checked`);
            if (selected) {
                let isTrue = selected.value === 'true';
                if (isTrue === q.correct) tfScore += q.points;
            }
        });
        total += tfScore;

        let shortScore = 0;
        document.querySelectorAll('.short-answer').forEach((ta, idx) => {
            const answer = ta.value;
            const len = countChineseChars(answer);
            const base10 = scoreByLength(len);
            const maxPoints = shortQuestions[idx].maxPoints;
            let points = Math.round(base10 / 10 * maxPoints);
            if (points > maxPoints) points = maxPoints;
            shortScore += points;
        });
        total += shortScore;

        let caseScore = 0;
        document.querySelectorAll('.case-answer').forEach((ta, idx) => {
            let answer = ta.value;
            let matched = 0;
            caseQuestions[idx].keywords.forEach(kw => { if (matchKeyword(answer, kw)) matched++; });
            let points = Math.min(caseQuestions[idx].maxPoints, matched * 1.5);
            caseScore += points;
        });
        total += Math.floor(caseScore);

        let details = [`填空题: ${fillScore}/20`, `单选题: ${singleScore}/20`, `多选题: ${multiScore}/15`, `判断题: ${tfScore}/10`, `简答题: ${shortScore}/20`, `案例分析: ${Math.floor(caseScore)}/15`];
        return { total: Math.min(100, total), details };
    }

    function showResult() {
        const name = document.getElementById('employeeName').value.trim() || "未填写";
        const dept = document.getElementById('department').value.trim() || "未填写";
        const date = document.getElementById('hireDate').value.trim() || "未填写";
        const { total, details } = calculateScore();
        lastScoreObj = { name, dept, total, details, date };
        const resultHtml = `<div><span style="font-size:1.8rem;font-weight:bold;">🎯 最终得分: ${total} 分</span> (满分100)<br/><br/><strong>明细：</strong><ul>${details.map(d=>`<li>${d}</li>`).join('')}</ul><p>${total>=60 ? "✅ 通过" : "⚠️ 未通过，请复习后补考"}</p></div>`;
        document.getElementById('resultPanel').innerHTML = resultHtml;
        document.getElementById('resultPanel').style.display = 'block';

        if (lastScoreObj) {
            sendToFeishu(true).catch(err => console.log("自动发送失败:", err));
        }
    }

    function copyResult() {
        if (!lastScoreObj) { alert("请先提交试卷！"); return; }
        const { name, dept, total, details, date } = lastScoreObj;
        const detailText = details.join("\n");
        const msg = `📊 新员工入职考试成绩\n姓名：${name}\n部门：${dept}\n日期：${date}\n总分：${total}/100\n明细：\n${detailText}\n${total>=60?"状态：合格":"状态：待补考"}`;
        navigator.clipboard.writeText(msg).then(() => alert("✅ 成绩已复制！请到飞书群按 Ctrl+V 发送。")).catch(() => alert("复制失败，可手动选中"));
    }

    async function sendToFeishu(silent = false) {
        if (!lastScoreObj) {
            if (!silent) alert("请先提交试卷！");
            return;
        }
        const webhook = FEISHU_WEBHOOK_URL;
        if (!webhook) {
            if (!silent) alert("系统未配置飞书 Webhook 地址，请联系管理员");
            return;
        }
        const { name, dept, total, details, date } = lastScoreObj;
        const detailText = details.join("\n");
        const payload = {
            msg_type: "text",
            content: {
                text: `📊 新员工入职考试成绩\n姓名：${name}\n部门：${dept}\n考试时间：${date}\n总分：${total}/100\n明细：\n${detailText}\n${total>=60?"状态：合格":"状态：待补考"}`
            }
        };
        try {
            const res = await fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                if (!silent) alert("✅ 成绩已发送到飞书！");
                else console.log("成绩已自动发送到飞书");
            } else {
                if (!silent) alert("❌ 发送失败，请检查网络或联系管理员");
                else console.warn("自动发送失败，状态码:", res.status);
            }
        } catch (err) {
            if (!silent) alert("发送异常：" + err.message);
            else console.error("自动发送异常:", err);
        }
    }

    function resetExam() {
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(el => el.checked = false);
        document.getElementById('resultPanel').style.display = 'none';
        lastScoreObj = null;
    }

    window.onload = () => {
        renderExam();
        document.getElementById('submitBtn').addEventListener('click', showResult);
        document.getElementById('resetBtn').addEventListener('click', resetExam);
        document.getElementById('copyResultBtn').addEventListener('click', copyResult);
        document.getElementById('sendToFeishuBtn').addEventListener('click', () => sendToFeishu(false));
    };
</script>
</body>
</html>
